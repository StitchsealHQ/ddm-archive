name: collect

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 KST 08:00
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect (구글·Bing·네이버)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect.py

      - name: AI dedup (사건 클러스터링)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ai_dedup.py

      - name: AI summarize (문서형 요약)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUM_PER_RUN: '200'   # 일일 레이트리밋까지 최대한 소진 (429는 다음 실행이 이어감)
        run: python summarize.py

      - name: Archive (90일 지난 자료 연도별 분리)
        run: python archive.py

      - name: Search trend (네이버 데이터랩)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python trend.py

      - name: Weekly briefing (월요일만 생성)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python briefing.py

      - name: Commit & push
        run: |
          git config user.name "ddm-archive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/*.json
          git diff --cached --quiet || git commit -m "data: auto collect $(date -u +%Y-%m-%d)"
          git push
