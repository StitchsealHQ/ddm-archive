name: collect

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 KST 08:00
  workflow_dispatch:

permissions:
  contents: write
  models: read
  issues: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect (구글·Bing·네이버)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect.py

      - name: YouTube (영상 수집·AI 판정·요약)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python youtube.py

      - name: AI dedup (사건 클러스터링)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ai_dedup.py

      - name: AI summarize (문서형 요약)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUM_PER_RUN: '200'   # 일일 레이트리밋까지 최대한 소진 (429는 다음 실행이 이어감)
        run: python summarize.py

      - name: Archive (90일 지난 자료 연도별 분리)
        run: python archive.py

      - name: Search trend (네이버 데이터랩)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python trend.py

      - name: Weekly briefing (월요일만 생성)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python briefing.py

      - name: Daily fortune (오늘의 장사운)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python fortune.py

      - name: Supabase keep-alive (무료 티어 휴면 방지)
        run: |
          curl -s -o /dev/null -w "supabase ping %{http_code}\n" \
            "https://vwbhainvzncciyiruepd.supabase.co/rest/v1/plaza_posts?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" || true

      - name: Commit & push
        run: |
          git config user.name "ddm-archive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/*.json
          git diff --cached --quiet || git commit -m "data: auto collect $(date -u +%Y-%m-%d)"
          git push

      - name: Close failure issue (정상 복구 시 자동 종료)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for n in $(gh issue list --repo ${{ github.repository }} --label cron-failure --state open --json number --jq '.[].number'); do
            gh issue close "$n" --repo ${{ github.repository }} \
              --comment "✅ 다음 실행이 정상 완료되어 자동 종료합니다."
          done

  # 크론 실패 알림 — 이슈 생성+멘션으로 GitHub 알림(메일·앱) 발송, 자격증명 불필요
  notify-fail:
    needs: collect
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or comment failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create cron-failure --repo ${{ github.repository }} \
            --color D93F0B --description "일일 수집 크론 실패" --force
          BODY="@StitchsealHQ 일일 수집 워크플로가 실패했습니다.

          실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          레이트리밋·일시 장애면 다음 실행에서 자동 복구되며, 복구 시 이 이슈는 자동으로 닫힙니다.
          이틀 연속 실패하면 점검이 필요합니다."
          EXIST=$(gh issue list --repo ${{ github.repository }} --label cron-failure --state open --json number --jq '.[0].number')
          if [ -n "$EXIST" ]; then
            gh issue comment "$EXIST" --repo ${{ github.repository }} --body "$BODY"
          else
            gh issue create --repo ${{ github.repository }} \
              --title "⚠️ 수집 크론 실패 $(TZ=Asia/Seoul date +%Y-%m-%d)" \
              --body "$BODY" --label cron-failure
          fi
