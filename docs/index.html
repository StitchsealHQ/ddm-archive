<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>동대문 아카이브</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --ink:#0E1526; --blue:#2657E8; --bg:#FFFFFF; --sub:#5B6472;
  --line:#E8EBF0; --soft:#F5F7FA;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
.wrap{max-width:1180px;margin:0 auto;padding:40px 24px 80px}
header h1{font-size:28px;font-weight:800;letter-spacing:-.5px}
header h1 span{color:var(--blue)}
.meta{font-size:13px;color:var(--sub);margin-top:6px}
.stats{display:flex;gap:12px;margin:24px 0;flex-wrap:wrap}
.stat{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:14px 20px;min-width:120px}
.stat b{display:block;font-size:22px;font-weight:800;color:var(--blue)}
.stat span{font-size:12px;color:var(--sub)}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
input[type=search]{flex:1;min-width:220px;padding:11px 16px;border:1px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit;outline:none}
input[type=search]:focus{border-color:var(--blue)}
select{padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 24px}
.chip{font-size:12.5px;padding:6px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--sub);font-family:inherit}
.chip.on{background:#EAF0FE;border-color:#BCCDF8;color:var(--blue);font-weight:600}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,transform .15s,box-shadow .15s;text-decoration:none;color:inherit}
.card:hover{border-color:#BCCDF8;transform:translateY(-2px);box-shadow:0 8px 24px rgba(14,21,38,.07)}
.imgwrap{position:relative;aspect-ratio:4/3;overflow:hidden;background:var(--soft)}
.imgwrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13.5px;letter-spacing:2.5px}
.kindpill{position:absolute;top:10px;left:10px;font-size:11px;padding:4px 11px;border-radius:999px;font-weight:700;backdrop-filter:blur(4px)}
.kind-뉴스{background:rgba(231,246,236,.92);color:#1B7F3B}
.kind-블로그{background:rgba(255,243,224,.92);color:#B26A00}
.kind-이미지{background:rgba(243,232,253,.92);color:#7C3AED}
.body{padding:14px 16px 15px;display:flex;flex-direction:column;gap:9px;flex:1}
.title{font-size:14px;font-weight:700;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card:hover .title{color:var(--blue)}
.foot{margin-top:auto;display:flex;flex-direction:column;gap:8px}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:10.5px;padding:3px 9px;border-radius:999px;font-weight:600;background:#EAF0FE;color:var(--blue)}
.src{font-size:11.5px;color:var(--sub);display:flex;justify-content:space-between;gap:8px}
.src b{font-weight:600;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;color:var(--sub);padding:60px 0;font-size:14px}
.aibadge{position:absolute;right:10px;bottom:10px;font-size:10.5px;padding:5px 12px;border-radius:999px;font-weight:700;background:rgba(38,87,232,.92);color:#fff;border:none;cursor:pointer;font-family:inherit}
.aibadge:hover{background:#1E47C7}
.overlay{position:fixed;inset:0;background:rgba(14,21,38,.55);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:50}
.overlay.open{display:flex}
.doc{background:#fff;border-radius:20px;max-width:640px;width:100%;padding:32px 36px 28px;position:relative;box-shadow:0 24px 64px rgba(14,21,38,.25)}
.doc .x{position:absolute;top:16px;right:18px;border:none;background:var(--soft);color:var(--sub);width:32px;height:32px;border-radius:999px;font-size:15px;cursor:pointer}
.doc .x:hover{background:#E8EBF0}
.doc .dmeta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.doc h2{font-size:20px;font-weight:800;line-height:1.4;letter-spacing:-.3px;margin-bottom:6px}
.doc .dsrc{font-size:12.5px;color:var(--sub);margin-bottom:18px}
.doc .label{font-size:11.5px;font-weight:800;color:var(--blue);letter-spacing:1px;margin:18px 0 8px}
.doc ul{list-style:none}
.doc ul li{font-size:14px;line-height:1.65;padding-left:16px;position:relative;margin-bottom:7px}
.doc ul li::before{content:'';position:absolute;left:2px;top:10px;width:5px;height:5px;border-radius:99px;background:var(--blue)}
.doc .cmt{background:#EAF0FE;border-radius:12px;padding:13px 16px;font-size:13.5px;line-height:1.6;color:#1E3FA8}
.doc .kws{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.doc .kw{font-size:11.5px;padding:4px 11px;border-radius:999px;background:var(--soft);border:1px solid var(--line);color:var(--sub)}
.doc .actions{display:flex;gap:10px;margin-top:24px;padding-top:18px;border-top:1px solid var(--line)}
.doc .go{flex:1;text-align:center;padding:12px;border-radius:12px;background:var(--blue);color:#fff;font-size:14px;font-weight:700;text-decoration:none}
.doc .go:hover{background:#1E47C7}
.doc .note{font-size:11px;color:var(--sub);text-align:center;margin-top:10px}
.more{display:block;margin:28px auto 0;padding:12px 32px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:14px;font-weight:600;color:var(--blue);cursor:pointer;font-family:inherit}
.more:hover{background:var(--soft)}
footer{margin-top:48px;font-size:12px;color:var(--sub);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>동대문 <span>아카이브</span></h1>
    <div class="meta">동대문 관련 뉴스·블로그·이미지 자료 모음 · 자동 수집 · 팀 내부 공유용 · 마지막 갱신 <span id="updated">—</span></div>
  </header>

  <div class="stats">
    <div class="stat"><b id="st-total">0</b><span>전체 자료</span></div>
    <div class="stat"><b id="st-week">0</b><span>최근 7일</span></div>
    <div class="stat"><b id="st-src">0</b><span>출처 수</span></div>
  </div>

  <div class="controls">
    <input type="search" id="q" placeholder="검색 (제목·출처)">
    <select id="kind">
      <option value="">전체 유형</option>
      <option>뉴스</option><option>블로그</option><option>이미지</option>
    </select>
    <select id="sort">
      <option value="date">최신순</option>
      <option value="thumb">썸네일 우선</option>
      <option value="source">출처순</option>
    </select>
  </div>
  <div class="chips" id="chips"></div>
  <div class="grid" id="list"></div>
  <div class="empty" id="empty" style="display:none">조건에 맞는 자료가 없습니다</div>
  <button class="more" id="more" style="display:none">더 보기</button>

  <footer>동대문 아카이브 · 팀 내부 공유용 (noindex)</footer>
</div>

<div class="overlay" id="overlay">
  <div class="doc" role="dialog" aria-modal="true">
    <button class="x" id="mclose" aria-label="닫기">✕</button>
    <div class="dmeta" id="mmeta"></div>
    <h2><a id="mtitle" href="#" target="_blank" rel="noopener" style="color:inherit;text-decoration:none"></a></h2>
    <div class="dsrc" id="msrc"></div>
    <div class="label">핵심 요약</div>
    <ul id="msummary"></ul>
    <div class="label">동대문 관점</div>
    <div class="cmt" id="mcomment"></div>
    <div class="kws" id="mkws"></div>
    <div class="actions"><a class="go" id="mgo" href="#" target="_blank" rel="noopener">원문 보기 ↗</a></div>
    <div class="note">AI가 생성한 요약으로 부정확할 수 있습니다 · 내부 공유용</div>
  </div>
</div>

<script>
let DATA=[], shown=48;
const $=id=>document.getElementById(id);
const state={q:'',tag:'',kind:'',sort:'date'};
const GRAD={
  '패션':['#FDECF2','#F6CFDE','#B0326B'],
  '도매시장':['#FFF4E3','#FBDFB3','#9A6210'],
  'DDP':['#EAF0FE','#C7D6FA','#2657E8'],
  '쇼핑/관광':['#E7F6EC','#BFE8CD','#1B7F3B'],
  'F&B':['#FFF0EB','#FBD2C2','#B2431F'],
  '기업/산업':['#EDF1F7','#D2DBE8','#3D5471'],
  '외국인':['#F3E8FD','#E0C8FA','#7C3AED'],
};
const DEF=['#F5F7FA','#E2E7EE','#5B6472'];

fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d.items||[];
  $('updated').textContent=(d.generated_at||'').slice(0,10);
  const tags=[...new Set(DATA.flatMap(i=>i.tags))].sort();
  $('chips').innerHTML=['<button class="chip on" data-t="">전체</button>',
    ...tags.map(t=>`<button class="chip" data-t="${t}">${t}</button>`)].join('');
  $('chips').onclick=e=>{
    const b=e.target.closest('.chip'); if(!b)return;
    state.tag=b.dataset.t; shown=48;
    document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c===b));
    render();
  };
  render();
});
$('q').oninput=e=>{state.q=e.target.value.toLowerCase();shown=48;render()};
$('kind').onchange=e=>{state.kind=e.target.value;shown=48;render()};
$('sort').onchange=e=>{state.sort=e.target.value;render()};
$('more').onclick=()=>{shown+=48;render()};

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}

function card(i){
  const g=GRAD[i.tags[0]]||DEF;
  const ph=`<div class="ph" style="background:linear-gradient(135deg,${g[0]},${g[1]});color:${g[2]}">DDM ARCHIVE</div>`;
  const img=i.thumbnail?`<img src="${esc(i.thumbnail)}" loading="lazy" referrerpolicy="no-referrer" alt="" onerror="this.remove()">`:'';
  const ai=i.summary?`<button class="aibadge" type="button">AI 요약</button>`:'';
  return `<a class="card" href="${esc(i.link)}" target="_blank" rel="noopener" data-idx="${DATA.indexOf(i)}">
    <div class="imgwrap">${ph}${img}<span class="kindpill kind-${i.kind}">${i.kind}</span>${ai}</div>
    <div class="body">
      <div class="title">${esc(i.title)}</div>
      <div class="foot">
        <div class="tags">${i.tags.map(t=>`<span class="pill">${t}</span>`).join('')}</div>
        <div class="src"><b>${esc(i.source)}</b><span>${i.date||''}</span></div>
      </div>
    </div>
  </a>`;
}

function render(){
  let rows=DATA.filter(i=>
    (!state.q||i.title.toLowerCase().includes(state.q)||i.source.toLowerCase().includes(state.q))&&
    (!state.tag||i.tags.includes(state.tag))&&
    (!state.kind||i.kind===state.kind));
  rows.sort((a,b)=>{
    if(state.sort==='source')return a.source.localeCompare(b.source,'ko');
    if(state.sort==='thumb')return (b.thumbnail?1:0)-(a.thumbnail?1:0)||(b.date||'').localeCompare(a.date||'');
    return (b.date||'').localeCompare(a.date||'');
  });
  const week=new Date(Date.now()-7*864e5).toISOString().slice(0,10);
  $('st-total').textContent=DATA.length.toLocaleString();
  $('st-week').textContent=DATA.filter(i=>i.date>=week).length.toLocaleString();
  $('st-src').textContent=new Set(DATA.map(i=>i.source)).size;
  $('list').innerHTML=rows.slice(0,shown).map(card).join('');
  $('empty').style.display=rows.length?'none':'block';
  $('more').style.display=rows.length>shown?'block':'none';
}

// 카드 클릭=원문 이동, "AI 요약" 뱃지 클릭=요약 모달
$('list').addEventListener('click',e=>{
  const b=e.target.closest('.aibadge'); if(!b)return;
  e.preventDefault(); e.stopPropagation();
  const i=DATA[+b.closest('.card').dataset.idx];
  if(i&&i.summary)openDoc(i);
});
function openDoc(i){
  $('mmeta').innerHTML=`<span class="pill" style="background:#E7F6EC;color:#1B7F3B">${i.kind}</span>`+
    i.tags.map(t=>`<span class="pill">${t}</span>`).join('');
  $('mtitle').textContent=i.title;
  $('mtitle').href=i.link;
  $('msrc').textContent=`${i.source} · ${i.date||''}`;
  $('msummary').innerHTML=i.summary.map(s=>`<li>${esc(s)}</li>`).join('');
  $('mcomment').textContent=i.comment||'';
  document.querySelectorAll('.doc .label')[1].style.display=i.comment?'':'none';
  $('mcomment').style.display=i.comment?'':'none';
  $('mkws').innerHTML=(i.keywords||[]).map(k=>`<span class="kw">#${esc(k)}</span>`).join('');
  $('mgo').href=i.link;
  $('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDoc(){$('overlay').classList.remove('open');document.body.style.overflow='';}
$('mclose').onclick=closeDoc;
$('overlay').onclick=e=>{if(e.target===$('overlay'))closeDoc();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDoc();});
</script>
</body>
</html>
